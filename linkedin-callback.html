<!DOCTYPE html>
<html><head><title>LinkedIn Auth</title>
<style>body{font-family:system-ui;max-width:600px;margin:4rem auto;padding:2rem;text-align:center;}
.code{background:#f0f0f0;padding:1rem;border-radius:8px;font-family:monospace;font-size:1.2rem;word-break:break-all;margin:1rem 0;}
</style></head><body>
<h2>LinkedIn Authorisation</h2>
<p>Copy the code below and send it to Donna:</p>
<div class="code" id="code">Checking...</div>
<script>
var params = new URLSearchParams(window.location.search);
var code = params.get('code');
var error = params.get('error');
if (code) {
  document.getElementById('code').textContent = code;
} else if (error) {
  document.getElementById('code').textContent = 'Error: ' + error + ' — ' + (params.get('error_description') || '');
} else {
  document.getElementById('code').textContent = 'No code received. Please try again.';
}
</script></body></html>
